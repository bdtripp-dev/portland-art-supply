services:
  portland-art-supply:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8081:80"
    volumes:
      - .:/workspace        # mount entire repo
      - ./public:/workspaces/portland-art-supply
      - ./includes:/workspaces/portland-art-supply/includes
      - ./vendor:/workspaces/portland-art-supply/vendor
networks:
  pas_net:
    name: pas_net
    driver: bridge
    external: true
